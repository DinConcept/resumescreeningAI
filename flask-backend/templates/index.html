<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ResumeAI - AI Resume Screening</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.container{max-width:1100px;margin:0 auto;padding:20px}
h1{text-align:center;font-size:2rem;margin:20px 0;background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{text-align:center;color:#94a3b8;margin-bottom:30px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
@media(max-width:768px){.grid{grid-template-columns:1fr}}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px}
.card h2{font-size:1.1rem;margin-bottom:15px;color:#38bdf8}
label{display:block;font-size:.85rem;color:#94a3b8;margin:8px 0 4px}
input,select,textarea{width:100%;padding:8px 12px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:.9rem}
input:focus,textarea:focus{outline:none;border-color:#38bdf8}
.btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:.9rem;transition:.2s}
.btn-primary{background:linear-gradient(135deg,#38bdf8,#818cf8);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-secondary{background:#334155;color:#e2e8f0}
.btn-sm{padding:6px 12px;font-size:.8rem}
.drop-zone{border:2px dashed #334155;border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:.2s}
.drop-zone:hover,.drop-zone.drag{border-color:#38bdf8;background:#1e293b}
.drop-zone p{color:#94a3b8}
.req-row{display:flex;gap:8px;align-items:end;margin-bottom:8px;flex-wrap:wrap}
.req-row input[type=text]{flex:2;min-width:120px}
.req-row input[type=number]{width:70px;flex:none}
.req-row select{width:120px;flex:none}
.req-row .btn{flex:none}
#results-section{display:none}
table{width:100%;border-collapse:collapse;margin-top:10px}
th{text-align:left;padding:10px;color:#38bdf8;border-bottom:1px solid #334155;font-size:.85rem}
td{padding:10px;border-bottom:1px solid #1e293b;font-size:.85rem}
tr:hover{background:#1e293b}
.score-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-weight:700;font-size:.85rem}
.score-high{background:#065f4620;color:#34d399}
.score-mid{background:#78350f20;color:#fbbf24}
.score-low{background:#7f1d1d20;color:#f87171}
.breakdown{font-size:.75rem;color:#94a3b8;margin-top:4px}
.skills-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.skill-tag{background:#334155;color:#94a3b8;padding:2px 8px;border-radius:10px;font-size:.7rem}
.loading{display:none;text-align:center;padding:30px;color:#38bdf8}
.spinner{display:inline-block;width:30px;height:30px;border:3px solid #334155;border-top-color:#38bdf8;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.actions{display:flex;gap:10px;margin:15px 0;justify-content:center}
.file-list{margin-top:10px;font-size:.8rem;color:#94a3b8}
.error{color:#f87171;font-size:.85rem;margin:5px 0}
</style>
</head>
<body>
<div class="container">
  <h1>🤖 ResumeAI</h1>
  <p class="subtitle">AI-Powered Resume Screening with TF-IDF Scoring</p>

  <div class="grid">
    <!-- Upload Section -->
    <div class="card">
      <h2>📄 Upload Resumes</h2>
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <p>📁 Drop PDF/DOCX files here or click to browse</p>
        <p style="font-size:.75rem;margin-top:8px">Supports bulk upload</p>
      </div>
      <input type="file" id="fileInput" multiple accept=".pdf,.docx,.doc" hidden>
      <div class="file-list" id="fileList"></div>
    </div>

    <!-- Requirements Section -->
    <div class="card">
      <h2>⚙️ Job Requirements</h2>
      <div id="reqList"></div>
      <button class="btn btn-secondary btn-sm" onclick="addReq()" style="margin-top:10px">+ Add Requirement</button>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" onclick="processResumes()" id="processBtn">🚀 Screen Resumes</button>
    <button class="btn btn-secondary" onclick="exportCSV()" id="exportBtn" style="display:none">📥 Export CSV</button>
  </div>

  <div class="loading" id="loading"><div class="spinner"></div><p style="margin-top:10px">Analyzing resumes...</p></div>
  <div class="error" id="errorMsg"></div>

  <!-- Results -->
  <div id="results-section" class="card">
    <h2>📊 Ranked Candidates</h2>
    <table><thead><tr><th>#</th><th>Candidate</th><th>Contact</th><th>Score</th><th>Skills</th><th>Breakdown</th></tr></thead>
    <tbody id="resultsBody"></tbody></table>
  </div>
</div>

<script>
const defaultReqs = [
  {category:'skills', label:'Technical Skills', keywords:'javascript,react,python,sql', weight:30},
  {category:'experience', label:'Experience (years)', keywords:'3', weight:25},
  {category:'education', label:'Education', keywords:'bachelor,master,computer science', weight:15},
  {category:'certifications', label:'Certifications', keywords:'aws certified,pmp,scrum master', weight:10},
  {category:'keywords', label:'Keywords', keywords:'team player,agile,leadership', weight:20}
];

let files = [];

// Drag & drop
const dz = document.getElementById('dropZone');
const fi = document.getElementById('fileInput');
['dragenter','dragover'].forEach(e => dz.addEventListener(e, ev => { ev.preventDefault(); dz.classList.add('drag'); }));
['dragleave','drop'].forEach(e => dz.addEventListener(e, ev => { ev.preventDefault(); dz.classList.remove('drag'); }));
dz.addEventListener('drop', ev => { files = [...files, ...ev.dataTransfer.files]; showFiles(); });
fi.addEventListener('change', () => { files = [...files, ...fi.files]; showFiles(); });

function showFiles() {
  document.getElementById('fileList').innerHTML = files.length
    ? `<strong>${files.length} file(s):</strong> ` + [...files].map(f => f.name).join(', ')
    : '';
}

// Requirements UI
function renderReqs() {
  const el = document.getElementById('reqList');
  const reqs = getReqs();
  el.innerHTML = reqs.map((r, i) => `
    <div class="req-row">
      <select onchange="updateReq(${i},'category',this.value)">
        ${['skills','experience','education','certifications','keywords'].map(c =>
          `<option value="${c}" ${r.category===c?'selected':''}>${c}</option>`).join('')}
      </select>
      <input type="text" placeholder="Label" value="${r.label}" onchange="updateReq(${i},'label',this.value)">
      <input type="text" placeholder="Keywords (comma-sep)" value="${r.keywords}" onchange="updateReq(${i},'keywords',this.value)">
      <input type="number" min="0" max="100" value="${r.weight}" onchange="updateReq(${i},'weight',+this.value)" title="Weight %">
      <button class="btn btn-secondary btn-sm" onclick="removeReq(${i})">✕</button>
    </div>`).join('');
}

let reqs = [...defaultReqs];
function getReqs() { return reqs; }
function updateReq(i, k, v) { reqs[i][k] = v; }
function removeReq(i) { reqs.splice(i, 1); renderReqs(); }
function addReq() { reqs.push({category:'skills',label:'',keywords:'',weight:10}); renderReqs(); }
renderReqs();

// Process
async function processResumes() {
  const err = document.getElementById('errorMsg');
  err.textContent = '';
  if (!files.length) { err.textContent = 'Please upload at least one resume.'; return; }

  const formData = new FormData();
  [...files].forEach(f => formData.append('resumes', f));
  const apiReqs = reqs.map(r => ({...r, keywords: r.keywords.split(',').map(k => k.trim()).filter(Boolean)}));
  formData.append('requirements', JSON.stringify(apiReqs));

  document.getElementById('loading').style.display = 'block';
  document.getElementById('processBtn').disabled = true;

  try {
    const res = await fetch('/api/screen', { method: 'POST', body: formData });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Processing failed');
    renderResults(data);
  } catch (e) {
    err.textContent = e.message;
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('processBtn').disabled = false;
  }
}

function renderResults(data) {
  const sec = document.getElementById('results-section');
  const body = document.getElementById('resultsBody');
  sec.style.display = 'block';
  document.getElementById('exportBtn').style.display = 'inline-block';

  body.innerHTML = data.filter(r => !r.error).map((r, i) => {
    const cls = r.score >= 70 ? 'score-high' : r.score >= 40 ? 'score-mid' : 'score-low';
    const bd = (r.breakdown||[]).map(b => `${b.label}: ${b.score}% (w:${b.weight})`).join(' | ');
    const skills = (r.skills||[]).map(s => `<span class="skill-tag">${s}</span>`).join('');
    return `<tr>
      <td>${i+1}</td>
      <td><strong>${r.name}</strong><br><small style="color:#64748b">${r.file}</small></td>
      <td><small>${r.email||'—'}<br>${r.phone||'—'}</small></td>
      <td><span class="score-badge ${cls}">${r.score}%</span></td>
      <td><div class="skills-list">${skills||'—'}</div></td>
      <td><div class="breakdown">${bd||'—'}</div></td>
    </tr>`;
  }).join('') + data.filter(r => r.error).map(r =>
    `<tr><td colspan="6" class="error">❌ ${r.file}: ${r.error}</td></tr>`
  ).join('');
}

function exportCSV() { window.open('/api/export'); }
</script>
</body>
</html>
